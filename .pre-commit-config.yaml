# Pre-commit configuration for reviewate monorepo
# Install: pre-commit install && pre-commit install --hook-type commit-msg
# Run manually: pre-commit run --all-files

repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(backend|code_reviewer)/
        types_or: [python, pyi]

      - id: ruff-format
        files: ^(backend|code_reviewer)/
        types_or: [python, pyi]

  # MyPy - Static type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.9.0
          - sqlmodel>=0.0.22
          - types-redis>=4.6.0
          - types-pyyaml>=6.0.12
          - fastapi>=0.115.0
        files: ^(backend|code_reviewer)/
        exclude: ^(backend|code_reviewer)/tests/
        args: [--install-types, --non-interactive, --ignore-missing-imports]

  # Frontend TypeScript checks
  - repo: local
    hooks:
      - id: frontend-typecheck
        name: frontend-typecheck
        entry: bash -c 'cd frontend && pnpm typecheck'
        language: system
        files: ^frontend/.*\.(ts|vue)$
        pass_filenames: false

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Prevent large files from being committed
      - id: check-added-large-files
        args: [--maxkb=1000]

      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict

      # Check for merge conflicts
      - id: check-merge-conflict

      # Check JSON files
      - id: check-json

      # Check TOML files
      - id: check-toml

      # Check YAML files
      - id: check-yaml
        args: [--unsafe] # Allow custom YAML tags

      # Detect private keys
      - id: detect-private-key
        exclude: ^code_reviewer/tests/test_guardrail\.py$

      # Fix end of files
      - id: end-of-file-fixer
        exclude: ^(backend|code_reviewer)/tests/fixtures/

      # Fix trailing whitespace
      - id: trailing-whitespace
        exclude: ^(backend|code_reviewer)/tests/fixtures/

      # Check Python AST
      - id: check-ast
        files: ^(backend|code_reviewer)/.*\.py$

      # Check for debugger imports
      - id: debug-statements
        files: ^(backend|code_reviewer)/.*\.py$

      # Check that docstrings come first
      - id: check-docstring-first
        files: ^(backend|code_reviewer)/.*\.py$

  # Commitizen - Validate commit messages
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.29.1
    hooks:
      - id: commitizen
        stages: [commit-msg]

# Global settings
ci:
  autofix_commit_msg: |
    style: auto fixes from pre-commit hooks

    Applied automatic fixes from pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
